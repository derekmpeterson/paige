name: Auto-merge

# Enables auto-merge (rebase) for trusted PRs. The branch protection on `main`
# still gates the actual merge on the required CI check passing, so nothing
# lands until "Lint, type-check, test, build" is green.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Allowlist: repo owner and Dependabot only; never auto-merge drafts.
    if: >-
      github.event.pull_request.draft == false &&
      (github.event.pull_request.user.login == 'derekmpeterson' ||
      github.event.pull_request.user.login == 'dependabot[bot]')
    steps:
      - name: Fetch Dependabot metadata
        id: dependabot
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        # Owner PRs: always. Dependabot PRs: minor/patch updates only.
        if: >-
          github.event.pull_request.user.login != 'dependabot[bot]' ||
          steps.dependabot.outputs.update-type == 'version-update:semver-minor' ||
          steps.dependabot.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --rebase "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
